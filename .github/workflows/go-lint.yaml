name: "Go: Lint"
on:
  workflow_call: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.21'

      - name: Run golangci-lint
        id: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.6
